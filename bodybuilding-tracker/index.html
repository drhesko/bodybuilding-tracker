<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MyGains — 12-Week Plan</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f0f13;--card:#1a1a24;--card2:#22222f;
  --accent:#ff6b2b;--accent2:#ff8c5a;
  --green:#22c55e;--blue:#3b82f6;--purple:#a855f7;
  --text:#f1f1f5;--text2:#9090aa;--border:#2a2a3a;
  --nav:70px;
}
html,body{height:100%;overflow-x:hidden}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;padding-bottom:var(--nav)}
#auth-overlay{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
#auth-box{width:100%;max-width:380px}
.nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav);background:var(--card);border-top:1px solid var(--border);display:flex;z-index:100}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;color:var(--text2);cursor:pointer;font-size:10px;font-weight:600;padding:8px 0;transition:color .2s}
.nb.active{color:var(--accent)}
.nb svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.page{display:none;min-height:calc(100vh - var(--nav))}
.page.active{display:block}
.ph{background:var(--card);padding:14px 18px 16px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50}
.ph h1{font-size:22px;font-weight:800}
.hero{background:linear-gradient(135deg,#1a0800,#2a1200,#0f0f13);padding:20px 18px;border-bottom:1px solid var(--border)}
.hero-date{font-size:13px;color:var(--text2);margin-bottom:4px}
.hero-row{display:flex;align-items:center;gap:10px;margin-bottom:6px;flex-wrap:wrap}
.hero-title{font-size:24px;font-weight:800;line-height:1.2}
.hero-sub{font-size:13px;color:var(--text2)}
.badge{display:inline-block;padding:4px 11px;border-radius:20px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px}
.gym-badge{background:var(--accent);color:#fff}
.rest-badge{background:var(--card2);color:var(--text2)}
.card{background:var(--card);border-radius:14px;padding:16px;margin:10px 14px;border:1px solid var(--border)}
.ct{font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px}
.pr{margin-bottom:10px}
.pr:last-child{margin-bottom:0}
.pl{display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px}
.pl span:last-child{color:var(--text2)}
.pt{height:9px;background:var(--card2);border-radius:5px;overflow:hidden}
.pf{height:100%;border-radius:5px;transition:width .4s ease}
.fo{background:linear-gradient(90deg,var(--accent),var(--accent2))}
.fg{background:linear-gradient(90deg,#16a34a,var(--green))}
.fb{background:linear-gradient(90deg,#2563eb,var(--blue))}
.sl{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1px;padding:14px 18px 6px}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding:0 14px}
.sc{background:var(--card);border-radius:12px;padding:14px 8px;text-align:center;border:1px solid var(--border)}
.sv{font-size:22px;font-weight:800;color:var(--accent)}
.sk{font-size:11px;color:var(--text2);margin-top:2px}
.ms{margin-bottom:0}
.mst{font-size:15px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.mst-macro{font-size:12px;color:var(--text2);font-weight:400;margin-left:auto}
.fi{display:flex;align-items:center;padding:11px 0;border-bottom:1px solid var(--border);gap:12px}
.fi:last-child{border-bottom:none}
.fck{width:26px;height:26px;border-radius:7px;border:2px solid var(--border);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.fck.on{background:var(--green);border-color:var(--green)}
.fn{flex:1}
.fname{font-size:15px;font-weight:500}
.fname.st{text-decoration:line-through;color:var(--text2)}
.fmac{font-size:12px;color:var(--text2);margin-top:2px}
.sec-sep{border:none;border-top:1px solid var(--border);margin:4px 0}
.ei{padding:13px 0;border-bottom:1px solid var(--border)}
.ei:last-child{border-bottom:none}
.eh{display:flex;align-items:center;gap:12px}
.eck{width:30px;height:30px;border-radius:8px;border:2px solid var(--border);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.eck.on{background:var(--accent);border-color:var(--accent)}
.ename{font-size:16px;font-weight:700}
.ename.st{text-decoration:line-through;color:var(--text2)}
.ed{margin-top:8px;margin-left:42px;display:flex;gap:8px;flex-wrap:wrap}
.chip{background:var(--card2);padding:4px 10px;border-radius:6px;font-size:12px;color:var(--text2)}
.enotes{margin-top:6px;margin-left:42px;font-size:12px;color:var(--text2);line-height:1.5}
.wc{display:flex;gap:8px;flex-wrap:wrap}
.wcup{width:38px;height:38px;border-radius:8px;border:2px solid var(--border);background:none;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.wcup.on{background:rgba(59,130,246,.2);border-color:var(--blue)}
.wk{border-bottom:1px solid var(--border)}
.wkh{padding:14px 18px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none}
.wkt{font-size:16px;font-weight:700}
.wkp{font-size:12px;color:var(--text2)}
.wkd{display:none;grid-template-columns:repeat(4,1fr);gap:8px;padding:0 14px 14px}
.wkd.open{display:grid}
.db{background:var(--card2);border:2px solid var(--border);border-radius:10px;padding:10px 6px;text-align:center;cursor:pointer;transition:all .15s}
.db:hover{border-color:var(--accent)}
.db.tod{border-color:var(--accent);background:rgba(255,107,43,.12)}
.db.done{border-color:var(--green)}
.dbn{font-size:11px;color:var(--text2);margin-bottom:2px}
.dbnum{font-size:17px;font-weight:800}
.dbt{font-size:11px;margin-top:2px}
.dbp{font-size:10px;color:var(--text2);margin-top:1px}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200}
.overlay.on{display:block}
.sheet{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-radius:20px 20px 0 0;max-height:92vh;overflow-y:auto;z-index:201;display:none;padding-bottom:50px}
.sheet.on{display:block}
.shdl{width:40px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 4px}
.igrp{margin-bottom:14px}
.ilbl{font-size:13px;color:var(--text2);margin-bottom:6px}
input[type=date],input[type=number],input[type=email],input[type=password]{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-size:15px;outline:none}
input[type=date]:focus,input[type=number]:focus,input[type=email]:focus,input[type=password]:focus{border-color:var(--accent)}
.bar-chart{display:flex;gap:5px;align-items:flex-end;height:100px;padding-top:4px}
.bc{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1}
.bc-bar{width:100%;border-radius:4px;transition:height .5s;min-height:2px}
.bc-lbl{font-size:9px;color:var(--text2)}
.bc-val{font-size:9px;color:var(--accent)}
.empty{text-align:center;padding:40px 20px;color:var(--text2)}
.empty .emo{font-size:48px;margin-bottom:12px}
.btn-primary{background:var(--accent);color:#fff;border:none;border-radius:12px;padding:14px 20px;width:100%;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px}
.btn-primary:disabled{opacity:.6;cursor:not-allowed}
.btn-danger{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);color:#ef4444;border-radius:12px;padding:12px 20px;width:100%;font-size:14px;font-weight:600;cursor:pointer}
.note-box{background:rgba(255,107,43,.08);border:1px solid rgba(255,107,43,.3);border-radius:10px;padding:12px;font-size:13px;color:var(--text2);line-height:1.5}
.phase-pill{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700}
@media(min-width:600px){
  body,#overlay{max-width:480px;margin-left:auto;margin-right:auto}
  .nav,.sheet{max-width:480px;left:50%;transform:translateX(-50%)}
}
</style>
</head>
<body>

<div id="auth-overlay">

      <div style="font-size:52px;margin-bottom:10px">💪</div>

    </div>

<script>
const sb = supabase.createClient(
  'https://prhkalnlocmkyevgnvki.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InByaGthbG5sb2Nta3lldmdudmtpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzNDg0NzQsImV4cCI6MjA5NTkyNDQ3NH0.aZE772oeSKlP_V_Vl35oImJdE_GB8nsqDyV_YEnKh5g'
);
let currentUser = null, authMode = 'signin';

sb.auth.onAuthStateChange(async (event, session) => {
  currentUser = session?.user || null;
  if (currentUser) {
    document.getElementById('auth-overlay').style.display = 'none';
    await syncFromSupabase();
    renderToday();
  } else {
    document.getElementById('auth-overlay').style.display = 'flex';
  }
});

async function syncFromSupabase() {
  if (!currentUser) return;
  try {
    const { data: s } = await sb.from('user_settings').select('*').eq('id', currentUser.id).single();
    if (s) {
      if (s.start_date) localStorage.setItem('bb_start', s.start_date);
      localStorage.setItem('bb_cfg', JSON.stringify({ cal: s.cal, prot: s.prot, water: s.water }));
    }
    const { data: checks } = await sb.from('daily_checks').select('*').eq('user_id', currentUser.id);
    if (checks) checks.forEach(c => localStorage.setItem('bb_ck_' + c.date, JSON.stringify(c.data)));
  } catch(e) { console.warn('Sync error:', e); }
}

async function pushSettings() {
  if (!currentUser) return;
  try {
    const cfg = getSettings();
    await sb.from('user_settings').upsert({ id: currentUser.id, start_date: localStorage.getItem('bb_start'), cal: cfg.cal, prot: cfg.prot, water: cfg.water, updated_at: new Date().toISOString() });
  } catch(e) {}
}

async function pushDayChecks(dateStr) {
  if (!currentUser) return;
  try {
    await sb.from('daily_checks').upsert({ user_id: currentUser.id, date: dateStr, data: getChecked(dateStr), updated_at: new Date().toISOString() }, { onConflict: 'user_id,date' });
  } catch(e) {}
}

function toggleAuthMode() {
  authMode = authMode === 'signin' ? 'signup' : 'signin';
  const isSignin = authMode === 'signin';
  document.getElementById('auth-btn').textContent = isSignin ? 'Sign In' : 'Create Account';
  document.getElementById('auth-toggle-lbl').textContent = isSignin ? 'Sign up' : 'Sign in';
  document.getElementById('auth-error').style.display = 'none';
  document.getElementById('auth-info').style.display = 'none';
}

async function authAction() {
  const email = document.getElementById('auth-email').value.trim();
  const pass = document.getElementById('auth-pass').value;
  const errEl = document.getElementById('auth-error'), infoEl = document.getElementById('auth-info'), btn = document.getElementById('auth-btn');
  errEl.style.display = 'none'; infoEl.style.display = 'none';
  if (!email || !pass) { errEl.textContent = 'Please enter your email and password.'; errEl.style.display = 'block'; return; }
  btn.textContent = '...'; btn.disabled = true;
  if (authMode === 'signup') {
    const { error } = await sb.auth.signUp({ email, password: pass });
    if (error) { errEl.textContent = error.message; errEl.style.display = 'block'; }
    else { infoEl.textContent = 'Account created! Check your email to confirm, then sign in.'; infoEl.style.display = 'block'; authMode = 'signin'; btn.textContent = 'Sign In'; btn.disabled = false; return; }
  } else {
    const { error } = await sb.auth.signInWithPassword({ email, password: pass });
    if (error) { errEl.textContent = error.message; errEl.style.display = 'block'; }
  }
  btn.disabled = false;
  if (btn.textContent === '...') btn.textContent = authMode === 'signin' ? 'Sign In' : 'Create Account';
}

async function logout() { await sb.auth.signOut(); localStorage.clear(); }

const DAY_NAMES=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const GYM_DAYS=new Set([1,3,5]);

function ld(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d)}
function ds(d){const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0');return`${y}-${m}-${dd}`}
function today(){return ds(new Date())}
function addDays(date,n){const d=new Date(date);d.setDate(d.getDate()+n);return d}
function fmtLong(s){return ld(s).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'})}
function fmtShort(s){return ld(s).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}
function phase(w){return w<=4?'p1':w<=8?'p2':'p3'}
function phaseLabel(w){return w<=4?'Foundation':w<=8?'Volume':'Intensification'}
function phasePill(w){const c=w<=4?'var(--accent)':w<=8?'var(--blue)':'var(--green)';return`<span class="phase-pill" style="background:${c}20;color:${c}">${phaseLabel(w)}</span>`}
function woKey(dow){if(dow===1)return'mon';if(dow===3)return'wed';if(dow===5)return'fri';return null}
function getStartDate(){const s=localStorage.getItem('bb_start');return s?ld(s):null}
function setStartDate(s){localStorage.setItem('bb_start',s);pushSettings();}
function getSettings(){return JSON.parse(localStorage.getItem('bb_cfg')||'{"cal":2800,"prot":160,"water":10}')}
function saveSettings(o){localStorage.setItem('bb_cfg',JSON.stringify(o));pushSettings();}
function getChecked(dateStr){return JSON.parse(localStorage.getItem('bb_ck_'+dateStr)||'{"m":{},"w":{},"water":0}')}
function saveChecked(dateStr,o){localStorage.setItem('bb_ck_'+dateStr,JSON.stringify(o));pushDayChecks(dateStr);}
function getWeekInfo(dateStr){
  const start=getStartDate();if(!start)return null;
  const diff=Math.round((ld(dateStr)-start)/(864e5));
  if(diff<0||diff>=84)return null;
  const weekNum=Math.floor(diff/7)+1,dow=ld(dateStr).getDay(),isGym=GYM_DAYS.has(dow),dayInWeek=diff%7;
  return{weekNum,dow,isGym,dayInWeek};
}
function getPlan(weekNum,dow){
  const ph=phase(weekNum),wk=woKey(dow),isGym=wk!==null;
  return{meals:isGym?MEALS.gym:MEALS.rest,workout:isGym?WO[ph][wk]:null,isGym,ph,wk};
}
function mealTotals(meals){let cal=0,prot=0;Object.values(meals).forEach(s=>s.items.forEach(i=>{cal+=i.cal;prot+=i.p}));return{cal,prot};}
function doneMacros(dateStr,meals){
  const ck=getChecked(dateStr);let cal=0,prot=0;
  Object.keys(meals).forEach(sk=>{meals[sk].items.forEach((it,i)=>{if(ck.m[sk+'_'+i]){cal+=it.cal;prot+=it.p}});});
  return{cal,prot};
}
function workoutProgress(dateStr,wo){
  if(!wo)return{done:0,total:0};
  const ck=getChecked(dateStr),total=wo.exs.length,done=wo.exs.filter((_,i)=>ck.w['e'+i]).length;
  return{done,total};
}
function dayPct(dateStr){
  const wi=getWeekInfo(dateStr);if(!wi)return null;
  const{meals,workout}=getPlan(wi.weekNum,wi.dow),ck=getChecked(dateStr);
  const totalFood=Object.values(meals).reduce((a,s)=>a+s.items.length,0);
  const doneFood=Object.values(ck.m).filter(Boolean).length;
  const{done:wd,total:wt}=workoutProgress(dateStr,workout);
  const total=totalFood+wt,done=doneFood+wd;
  return total?Math.round(done/total*100):0;
}

function chkSvg(){return'<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>'}

function renderBars(dateStr,meals,workout){
  const cfg=getSettings(),{cal:dc,prot:dp}=doneMacros(dateStr,meals),{done:wd,total:wt}=workoutProgress(dateStr,workout),ck=getChecked(dateStr),water=ck.water||0;
  const calPct=Math.min(100,Math.round(dc/cfg.cal*100)),protPct=Math.min(100,Math.round(dp/cfg.prot*100)),waterPct=Math.min(100,Math.round(water/cfg.water*100)),woPct=wt?Math.min(100,Math.round(wd/wt*100)):0;
  return`<div class="card" id="bars-${dateStr}">
    <div class="pr"><div class="pl"><span>🔥 Calories</span><span>${dc} / ${cfg.cal} kcal</span></div><div class="pt"><div class="pf fo" style="width:${calPct}%"></div></div></div>
    <div class="pr"><div class="pl"><span>💪 Protein</span><span>${dp}g / ${cfg.prot}g</span></div><div class="pt"><div class="pf fg" style="width:${protPct}%"></div></div></div>
    ${wt?`<div class="pr"><div class="pl"><span>🏋️ Workout</span><span>${wd}/${wt} exercises</span></div><div class="pt"><div class="pf fo" style="width:${woPct}%"></div></div></div>`:''}
    <div class="pr"><div class="pl"><span>💧 Water</span><span>${water}/${cfg.water} cups</span></div><div class="pt"><div class="pf fb" style="width:${waterPct}%"></div></div></div>
  </div>`;
}

function renderMeals(dateStr,meals){
  const ck=getChecked(dateStr);
  const sections=Object.entries(meals).map(([sk,sec])=>{
    const sCal=sec.items.reduce((a,i)=>a+i.cal,0),sProt=sec.items.reduce((a,i)=>a+i.p,0);
    const rows=sec.items.map((it,i)=>{
      const key=sk+'_'+i,on=!!ck.m[key];
      return`<div class="fi" id="fi-${dateStr}-${sk}-${i}"><button class="fck ${on?'on':''}" onclick="toggleFood('${dateStr}','${sk}',${i})">${on?chkSvg():''}</button><div class="fn"><div class="fname${on?' st':''}">${it.n}</div><div class="fmac">${it.cal} kcal &middot; ${it.p}g protein</div></div></div>`;
    }).join('');
    return`<div class="ms"><div class="mst">${sec.icon} ${sec.label}<span class="mst-macro">${sCal} kcal · ${sProt}g P</span></div>${rows}</div>`;
  }).join('<hr class="sec-sep">');
  return`<div class="card">${sections}</div>`;
}

function renderWater(dateStr){
  const cfg=getSettings(),ck=getChecked(dateStr),water=ck.water||0;
  const cups=Array.from({length:cfg.water},(_,i)=>`<button class="wcup ${i<water?'on':''}" onclick="toggleWater('${dateStr}',${i+1})">💧</button>`).join('');
  return`<div class="card" id="water-${dateStr}"><div class="ct">Water Intake</div><div class="wc">${cups}</div><div style="font-size:12px;color:var(--text2);margin-top:8px">${water} of ${cfg.water} cups · ${water*250}ml drunk</div></div>`;
}

function renderWorkout(dateStr,wo){
  if(!wo)return`<div class="card"><div style="text-align:center;padding:20px 0"><div style="font-size:40px;margin-bottom:10px">😴</div><div style="color:var(--text2);font-size:15px">Rest Day — No workout today.<br>Focus on nutrition and recovery.</div></div></div>`;
  const ck=getChecked(dateStr),{done,total}=workoutProgress(dateStr,wo),pct=total?Math.round(done/total*100):0;

  }).join('');
  return`<div class="card"><div style="margin-bottom:12px"><div style="font-size:13px;color:var(--text2);margin-bottom:6px">${wo.focus}</div><div class="pt"><div class="pf fo" style="width:${pct}%"></div></div><div style="font-size:12px;color:var(--text2);margin-top:4px">${done}/${total} exercises complete</div></div>${exs}</div>`;

  const el=document.getElementById('p-today'),start=getStartDate(),t=today();

function renderCal(){
  const el=document.getElementById('p-cal'),start=getStartDate(),t=today();
  if(!start){el.innerHTML=`<div class="ph"><h1>12-Week Plan</h1></div><div class="empty"><div class="emo">📅</div><p>Set your start date in Settings to see your full plan.</p></div>`;return;}
  const wi=getWeekInfo(t),curWeek=wi?wi.weekNum:0;
  let html=`<div class="ph"><h1>12-Week Plan</h1><div style="font-size:13px;color:var(--text2);margin-top:2px">Mon · Wed · Fri = Gym &nbsp;|&nbsp; Tue · Thu · Sat · Sun = Rest</div></div>`;
  for(let w=0;w<12;w++){
    const wn=w+1,pctArr=[];
    const days=Array.from({length:7},(_,d)=>{
      const date=ds(addDays(start,w*7+d)),dow=ld(date).getDay(),isGym=GYM_DAYS.has(dow),isToday=date===t,isPast=date<t,p=dayPct(date);

      <div style="min-width:0">
        <div style="font-size:12px;color:var(--text2);margin-bottom:2px">Signed in as</div>
        <div style="font-weight:600;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${currentUser?.email||''}</div>
        <div style="font-size:11px;color:var(--green);margin-top:3px">☁️ Progress syncs across all your devices</div>
      </div>
      <button onclick="logout()" style="flex-shrink:0;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);color:#ef4444;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer">Sign Out</button>
    </div>
  </div>
  <div class="card">
    <div class="ct">Your Profile</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div style="background:var(--card2);border-radius:8px;padding:10px"><div style="font-size:11px;color:var(--text2)">Weight</div><div style="font-weight:700;margin-top:2px">64 kg</div></div>
      <div style="background:var(--card2);border-radius:8px;padding:10px"><div style="font-size:11px;color:var(--text2)">Height</div><div style="font-weight:700;margin-top:2px">175 cm</div></div>
      <div style="background:var(--card2);border-radius:8px;padding:10px"><div style="font-size:11px;color:var(--text2)">Goal</div><div style="font-weight:700;margin-top:2px">Muscle Gain</div></div>
      <div style="background:var(--card2);border-radius:8px;padding:10px"><div style="font-size:11px;color:var(--text2)">Gym Days</div><div style="font-weight:700;margin-top:2px">Mon · Wed · Fri</div></div>
    </div>
  </div>
  <div class="card">
    <div class="ct">Plan Start Date</div>
    <p style="font-size:13px;color:var(--text2);margin-bottom:12px;line-height:1.6">Pick the Monday you want Week 1 to start.</p>
    <div class="igrp" style="margin-bottom:0">
      <div class="ilbl">Start date (choose a Monday)</div>
      <input type="date" id="si" value="${startStr}" onchange="setSDate(this.value)">
    </div>
    ${start?`<div style="font-size:12px;color:var(--green);margin-top:8px">✓ Plan started ${fmtShort(startStr)}</div>`:''}
  </div>
  <div class="card">
    <div class="ct">Daily Targets</div>
    <div class="igrp"><div class="ilbl">Calorie target (kcal/day)</div><input type="number" value="${cfg.cal}" onchange="saveCfg('cal',+this.value)"></div>
    <div class="igrp"><div class="ilbl">Protein target (g/day)</div><input type="number" value="${cfg.prot}" onchange="saveCfg('prot',+this.value)"></div>
    <div class="igrp" style="margin-bottom:0"><div class="ilbl">Water target (cups/day — 1 cup = 250ml)</div><input type="number" value="${cfg.water}" onchange="saveCfg('water',+this.value)"></div>
  </div>
  <div class="card">
    <div class="ct">Lower Back Note ⚠️</div>
    <div class="note-box">This plan was designed for your lower back pain:<br><br>• <strong>Chest-Supported Row</strong> instead of bent-over row<br>• <strong>Leg Press & Goblet Squat</strong> instead of barbell squat<br>• <strong>Hip Thrust</strong> instead of deadlift<br>• <strong>Seated presses</strong> for back support<br><br>If any exercise causes lower back pain — stop and see a physiotherapist.</div>
  </div>
  <div class="card">
    <div class="ct">Data</div>
    <button class="btn-danger" onclick="if(confirm('Reset all progress? This cannot be undone.')){localStorage.clear();if(currentUser){sb.from('daily_checks').delete().eq('user_id',currentUser.id);sb.from('user_settings').delete().eq('id',currentUser.id);}location.reload()}">Reset All Progress</button>
  </div>
  <div style="height:10px"></div>`;
}

function openSheet(dateStr){
  const start=getStartDate();if(!start)return;
  const wi=getWeekInfo(dateStr);if(!wi)return;
  const{meals,workout,isGym}=getPlan(wi.weekNum,wi.dow),t=mealTotals(meals);
  document.getElementById('sheet').innerHTML=`<div class="shdl"></div>
  <div style="padding:0 18px 14px;display:flex;justify-content:space-between;align-items:flex-start">
    <div><div style="font-size:13px;color:var(--text2)">${fmtShort(dateStr)}</div><div style="font-size:21px;font-weight:800;margin:3px 0">Week ${wi.weekNum}, Day ${wi.dayInWeek+1}</div><div>${phasePill(wi.weekNum)}</div></div>
    <span class="badge ${isGym?'gym-badge':'rest-badge'}" style="margin-top:4px">${isGym?'💪 GYM':'😴 REST'}</span>
  </div>
  ${renderBars(dateStr,meals,workout)}
  <div class="sl">Meals — ${t.cal} kcal · ${t.prot}g protein planned</div>
  ${renderMeals(dateStr,meals)}${renderWater(dateStr)}
  <div class="sl">${isGym?workout.name:'Rest Day'}</div>
  ${renderWorkout(dateStr,workout)}`;
  document.getElementById('sheet').classList.add('on');
  document.getElementById('overlay').classList.add('on');
}

function closeSheet(){document.getElementById('sheet').classList.remove('on');document.getElementById('overlay').classList.remove('on');}

function toggleFood(dateStr,sk,i){
  const ck=getChecked(dateStr),key=sk+'_'+i;ck.m[key]=!ck.m[key];saveChecked(dateStr,ck);
  const row=document.getElementById(`fi-${dateStr}-${sk}-${i}`);
  if(row){const btn=row.querySelector('.fck'),name=row.querySelector('.fname');btn.className='fck'+(ck.m[key]?' on':'');btn.innerHTML=ck.m[key]?chkSvg():'';name.className='fname'+(ck.m[key]?' st':'');}
  refreshBars(dateStr);
}
function toggleEx(dateStr,i){
  const ck=getChecked(dateStr);ck.w['e'+i]=!ck.w['e'+i];saveChecked(dateStr,ck);
  const row=document.getElementById(`ei-${dateStr}-${i}`);
  if(row){const btn=row.querySelector('.eck'),name=row.querySelector('.ename');btn.className='eck'+(ck.w['e'+i]?' on':'');btn.innerHTML=ck.w['e'+i]?chkSvg():'';name.className='ename'+(ck.w['e'+i]?' st':'');}
  refreshBars(dateStr);
}
function toggleWater(dateStr,cups){
  const ck=getChecked(dateStr);ck.water=(cups===ck.water)?cups-1:cups;saveChecked(dateStr,ck);
  document.querySelectorAll(`#water-${dateStr} .wcup`).forEach((el,i)=>{el.className='wcup'+(i<ck.water?' on':'');});
  const winfo=document.querySelector(`#water-${dateStr} div:last-child`),cfg=getSettings();
  if(winfo)winfo.textContent=`${ck.water} of ${cfg.water} cups · ${ck.water*250}ml drunk`;
  refreshBars(dateStr);
}
function refreshBars(dateStr){
  const wi=getWeekInfo(dateStr);if(!wi)return;
  const{meals,workout}=getPlan(wi.weekNum,wi.dow),cfg=getSettings(),{cal:dc,prot:dp}=doneMacros(dateStr,meals),{done:wd,total:wt}=workoutProgress(dateStr,workout),ck=getChecked(dateStr),water=ck.water||0;
  const calPct=Math.min(100,Math.round(dc/cfg.cal*100)),protPct=Math.min(100,Math.round(dp/cfg.prot*100)),waterPct=Math.min(100,Math.round(water/cfg.water*100)),woPct=wt?Math.min(100,Math.round(wd/wt*100)):0;
  document.querySelectorAll(`#bars-${dateStr} .pr`).forEach(pr=>{
    const lbl=pr.querySelector('.pl span'),fill=pr.querySelector('.pf'),val=pr.querySelectorAll('.pl span')[1];
    if(!lbl)return;const t=lbl.textContent;
    if(t.includes('Calorie')){fill.style.width=calPct+'%';val.textContent=`${dc} / ${cfg.cal} kcal`;}
    else if(t.includes('Protein')){fill.style.width=protPct+'%';val.textContent=`${dp}g / ${cfg.prot}g`;}
    else if(t.includes('Workout')&&wt){fill.style.width=woPct+'%';val.textContent=`${wd}/${wt} exercises`;}
    else if(t.includes('Water')){fill.style.width=waterPct+'%';val.textContent=`${water}/${cfg.water} cups`;}
  });
  if(dateStr===today()){const pct=dayPct(dateStr)||0;const hf=document.querySelector('#p-today .pf');if(hf)hf.style.width=pct+'%';const hv=document.querySelector('#p-today [style*="color:var(--accent);font-weight:700"]');if(hv)hv.textContent=pct+'%';}
}

function nav(page,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
  document.getElementById('p-'+page).classList.add('active');
  if(btn)btn.classList.add('active');
  if(page==='today')renderToday();
  if(page==='cal')renderCal();
  if(page==='prog')renderProg();
  if(page==='set')renderSettings();
}
function setSDate(v){setStartDate(v);renderToday();renderCal();renderProg();}
function saveCfg(k,v){const cfg=getSettings();cfg[k]=v;saveSettings(cfg);}

renderToday();
</script>
</body>
</html>
